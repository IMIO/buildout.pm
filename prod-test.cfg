[buildout]

extends =
    base.cfg

auto-checkout =

parts =
    testprod

[testprod]
recipe = zc.recipe.testrunner
defaults = ['--auto-color', '--auto-progress', '-s', 'Products.MeetingCommunes', '-s', 'plonemeeting.restapi', '-s', 'imio.pm.ws', '-s', 'imio.zamqp.pm']
eggs =
    ${test:eggs}
    Products.MeetingCommunes [test]
    plonemeeting.restapi [test]
    imio.pm.ws [test]
    imio.zamqp.pm [test]
environment = testenv
